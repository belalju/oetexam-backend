spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  upload:
    audio-dir: ${AUDIO_UPLOAD_DIR:/app/uploads/audio/}

logging:
  file:
    path: ${LOG_DIR:/app/logs}
  level:
    root: WARN
    com.oet: INFO
