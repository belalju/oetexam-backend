spring:
  application:
    name: oetexam
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 75MB
      max-request-size: 75MB
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:post.englishforlife@gmail.com}
    password: ${SMTP_PASSWORD:fzfj xarv qpoz oiqp}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  tomcat:
    max-http-form-post-size: 75MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long}
    access-token-expiration-ms: 3600000
    refresh-token-expiration-ms: 604800000
  upload:
    audio-dir: ${AUDIO_UPLOAD_DIR:./uploads/audio/}
  google:
    client-id: ${GOOGLE_CLIENT_ID:480399955475-en9hgiaa5cf6bp6oggb86m0ffhnobpcr.apps.googleusercontent.com}
  mail:
    from: ${MAIL_FROM:no-reply@oetpractice.com}
    verification-token-expiration-hours: 24
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

