version: '3.8'

services:
  app:
    build: .
    # Local builds default to oetexam:latest; CI deploy sets APP_IMAGE to the local-registry image tag
    image: ${APP_IMAGE:-oetexam:latest}
    container_name: oetexam-app
    restart: unless-stopped
    ports:
      # localhost-only: reachable just by the host nginx (/api), not from outside
      - "127.0.0.1:8088:8080"
    # All app configuration (DB credentials, JWT, SMTP, CORS, ...) comes from .env
    # next to this file — see .env.prod.example for the full list of keys
    env_file:
      - path: .env
        required: false
    environment:
      # Container-specific values that must not be overridden by .env
      SPRING_PROFILES_ACTIVE: prod
      # MySQL runs on the host machine; host.docker.internal resolves to the host
      DB_URL: ${DB_URL:-jdbc:mysql://host.docker.internal:3308/oet_practice?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      AUDIO_UPLOAD_DIR: /app/uploads/audio/
      LOG_DIR: /app/logs
    extra_hosts:
      # Makes host.docker.internal work on Linux hosts (no-op on Docker Desktop)
      - "host.docker.internal:host-gateway"
    volumes:
      - audio_uploads:/app/uploads/audio
      - app_logs:/app/logs

volumes:
  audio_uploads:
  app_logs: